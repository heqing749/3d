<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>榫卯结构交互演示</title>
    <!-- 引入 Import Map，解决模块路径问题 -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; user-select: none; }

        /* UI 样式 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* 左下角名称 */
        #name-label {
            position: absolute; bottom: 30px; left: 30px;
            color: white; font-size: 24px; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* 中间暂停按钮 */
        #pause-btn {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 10px 30px; font-size: 18px; border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.5); background: rgba(0,0,0,0.5);
            color: white; cursor: pointer; pointer-events: auto; transition: all 0.3s;
        }
        #pause-btn:hover { background: rgba(255,255,255,0.2); border-color: white; }
        #pause-btn.active { background: #ff4d4f; border-color: #ff4d4f; } /* 激活时的红色 */

        /* 提示文字 */
        #hint-text {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: rgba(255,255,255,0.7); font-size: 14px; pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- UI 层 -->
    <div id="ui-layer">
        <div id="hint-text">默认模式：拖动旋转视角 | 暂停模式：点击零件进行拆解</div>
        <div id="name-label">名称：榫卯</div>
        <button id="pause-btn">暂停 / 进入拆解</button>
    </div>

    <!-- 主逻辑脚本 -->
    <script type="module" src="./main.js"></script>
</body>
</html>
